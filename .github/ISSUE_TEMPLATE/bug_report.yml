name: Bug report
description: Report a reproducible problem
title: '[Bug]: '
labels: ['bug']
body:
    - type: textarea
      id: description
      attributes:
          label: Description
          description: Clear summary of the bug
      validations:
          required: true
    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          description: Include exact steps and sample code when possible
      validations:
          required: true
    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
      validations:
          required: true
    - type: textarea
      id: actual
      attributes:
          label: Actual behavior
      validations:
          required: true
    - type: input
      id: version
      attributes:
          label: Package version
          placeholder: e.g. 0.1.0
      validations:
          required: true
